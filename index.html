    <!-- JS Логіка -->
    <script>
        const API_KEY = 'AIzaSyAeFU5uOUoRvsZL1mXhovlQJ0emfXAPDtk';
        const SPREADSHEET_ID = '1-SCzKnU1HWu9xLqi6cSMWuA8dfOD5HC-P-FcVLgbeJM';
        const SHEET_NAME = 'Інформація';
        // Посилання за замовчуванням
        const DEFAULT_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwra_OPK6Nbo1E_aGVO0h_RlmnoJE-DpVvAVnqgP0HsaAnQXH8wFfgDPir-vOls7VCpTA/exec';

        const HEADERS = {
            article: 'Артикул',
            date: 'Дата',
            name: 'Назва',
            liftedBy: 'Піднімали',
            stock: 'Запас',
            pallet: 'Палета',
            cell: 'Ячейка',
            inCell: 'В ячейці'
        };

        const BTN_HIDE = 'Приховати';
        const BTN_SHOW = 'Показати';

        document.addEventListener('DOMContentLoaded', () => {
            const mobileCardsList = document.getElementById('mobile-cards-list');
            const uniqueArticlesCountSpan = document.getElementById('header-stats-text');
            const resetButton = document.getElementById('reset-button');
            const loader = document.getElementById('loader');
            const dataContainer = document.getElementById('data-container');
            const offlineStatus = document.getElementById('offline-status');
            const searchInput = document.getElementById('search-input');

            let allUniqueRows = [];
            let searchQuery = '';

            // Поточна дата
            const todayFormatted = new Date().toLocaleDateString('uk-UA', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            }).replace(/\//g, '.');

            // Офлайн стан
            function updateOnlineStatus() {
                if (navigator.onLine) offlineStatus.classList.add('hidden');
                else offlineStatus.classList.remove('hidden');
            }
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();

            // LocalStorage
            function saveSeenArticles(articles) {
                localStorage.setItem('seenArticles_v3', JSON.stringify(articles));
            }

            function getSeenArticles() {
                const seen = localStorage.getItem('seenArticles_v3');
                return seen ? JSON.parse(seen) : [];
            }

            function saveCachedData(data) {
                localStorage.setItem('cached_sheet_data_v3', JSON.stringify(data));
            }

            function getCachedData() {
                const data = localStorage.getItem('cached_sheet_data_v3');
                return data ? JSON.parse(data) : null;
            }

            function getDokydkaItems() {
                const items = localStorage.getItem('dokydka_items_v2');
                return items ? JSON.parse(items) : [];
            }

            function saveDokydkaItems(items) {
                localStorage.setItem('dokydka_items_v2', JSON.stringify(items));
                updateDokydkaInterface();
            }

            // Налаштування Apps Script URL
            const appsScriptInput = document.getElementById('apps-script-url-input');
            if (appsScriptInput) {
                const savedUrl = localStorage.getItem('apps_script_url_v2');
                if (!savedUrl) {
                    localStorage.setItem('apps_script_url_v2', DEFAULT_APPS_SCRIPT_URL);
                    appsScriptInput.value = DEFAULT_APPS_SCRIPT_URL;
                } else {
                    appsScriptInput.value = savedUrl;
                }
                appsScriptInput.addEventListener('input', (e) => {
                    localStorage.setItem('apps_script_url_v2', e.target.value.trim() || DEFAULT_APPS_SCRIPT_URL);
                });
            }

            // Побудова timestamp
            function parseDateTime(dateString, timeString) {
                if (!dateString || !timeString) return 0;
                const [day, month, year] = String(dateString).split('.').map(Number);
                const [hours, minutes, seconds] = String(timeString).split(':').map(Number);
                if (isNaN(day) || isNaN(month) || isNaN(year)) return 0;
                return new Date(year, month - 1, day, hours || 0, minutes || 0, seconds || 0).getTime();
            }

            // Toast-сповіщення
            function showToast(message, type = 'info') {
                const toast = document.getElementById('toast-message');
                const text = document.getElementById('toast-text');
                const icon = document.getElementById('toast-icon');

                text.textContent = message;
                if (type === 'error') icon.className = 'fa-solid fa-circle-exclamation text-rose-400';
                else if (type === 'success') icon.className = 'fa-solid fa-circle-check text-emerald-400';
                else icon.className = 'fa-solid fa-circle-info text-cyan-400';

                toast.classList.remove('translate-y-32');
                toast.classList.add('translate-y-0');

                setTimeout(() => {
                    toast.classList.remove('translate-y-0');
                    toast.classList.add('translate-y-32');
                }, 3000);
            }

            // Вбудована красива модалка підтвердження
            let onConfirmCallback = null;
            function showConfirm(title, desc, onConfirm) {
                const modal = document.getElementById('confirm-modal');
                const t = document.getElementById('confirm-title');
                const d = document.getElementById('confirm-desc');
                t.textContent = title;
                d.textContent = desc;
                onConfirmCallback = onConfirm;
                modal.classList.remove('pointer-events-none', 'opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }

            function closeConfirm() {
                const modal = document.getElementById('confirm-modal');
                modal.classList.add('pointer-events-none', 'opacity-0');
                modal.querySelector('div').classList.add('scale-95');
                onConfirmCallback = null;
            }

            document.getElementById('confirm-cancel-btn').addEventListener('click', closeConfirm);
            document.getElementById('confirm-ok-btn').addEventListener('click', () => {
                if (onConfirmCallback) onConfirmCallback();
                closeConfirm();
            });

            // Помилка завантаження
            function showError(message) {
                loader.classList.add('hidden');
                dataContainer.innerHTML = `
                    <div class="bg-rose-50 border border-rose-100 text-rose-800 rounded-3xl p-5 text-xs flex flex-col items-center gap-3">
                        <i class="fa-solid fa-triangle-exclamation text-xl text-rose-500"></i>
                        <p class="font-bold text-center">Не вдалося завантажити дані з Google Sheets</p>
                        <p class="text-[10px] text-rose-500 text-center">${message}</p>
                        <button onclick="window.location.reload()" class="mt-1 px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white rounded-xl font-bold text-[10px] transition-all">
                            Спробувати ще раз
                        </button>
                    </div>
                `;
                dataContainer.classList.remove('hidden');
            }

            // Побудова індексів колонок
            function buildColumnIndices(headerRow) {
                const indices = {};
                for (const key in HEADERS) {
                    const headerName = HEADERS[key];
                    const idx = headerRow.findIndex(h => typeof h === 'string' && h.trim() === headerName);
                    indices[key] = idx;
                }
                const timeIndices = [];
                headerRow.forEach((h, i) => {
                    if (typeof h === 'string' && h.trim() === 'Час') timeIndices.push(i);
                });
                indices.timeAfterDate = timeIndices[0] !== undefined ? timeIndices[0] : -1;
                indices.timeAfterLifted = timeIndices[1] !== undefined ? timeIndices[1] : -1;
                return indices;
            }

            // Логіка Докидки
            function toggleDokydkaItem(item) {
                let current = getDokydkaItems();
                const exists = current.some(i => i.article === item.article);
                if (exists) {
                    current = current.filter(i => i.article !== item.article);
                    showToast(`Прибрано: ${item.article}`, 'info');
                } else {
                    current.push(item);
                    showToast(`Додано в докидку: ${item.article}`, 'success');
                }
                saveDokydkaItems(current);
                renderAll(allUniqueRows);
            }

            function updateDokydkaInterface() {
                const items = getDokydkaItems();
                const badge = document.getElementById('dokydka-badge-count');
                const navBadge = document.getElementById('nav-dokydka-count-badge');
                const emptyState = document.getElementById('dokydka-list-empty');
                const listWrapper = document.getElementById('dokydka-list-wrapper');

                if (badge) badge.textContent = `${items.length} товарів`;
                if (navBadge) {
                    if (items.length > 0) {
                        navBadge.textContent = items.length;
                        navBadge.classList.remove('hidden');
                    } else {
                        navBadge.classList.add('hidden');
                    }
                }

                if (items.length === 0) {
                    emptyState.classList.remove('hidden');
                    listWrapper.classList.add('hidden');
                    listWrapper.innerHTML = '';
                    return;
                }

                emptyState.classList.add('hidden');
                listWrapper.classList.remove('hidden');
                listWrapper.innerHTML = '';

                items.forEach((item, index) => {
                    const row = document.createElement('div');
                    row.className = 'bg-slate-50 border border-slate-100 p-3 rounded-2xl flex items-center justify-between gap-3';
                    row.innerHTML = `
                        <div class="flex flex-col gap-0.5 min-w-0 flex-1">
                            <div class="flex items-center gap-1.5">
                                <span class="text-xs font-black text-slate-900 select-all">${item.article}</span>
                                <span class="text-[9px] bg-slate-200 text-slate-600 font-bold px-1.5 py-0.5 rounded">Яч: ${item.cell}</span>
                            </div>
                            <span class="text-[11px] text-slate-500 font-medium truncate block">${item.name}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-black bg-cyan-100 text-cyan-800 px-2 py-0.5 rounded-lg">К-сть: ${item.count}</span>
                            <button class="remove-dokydka-btn text-slate-400 hover:text-red-500 p-2 text-base" data-index="${index}">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    `;
                    listWrapper.appendChild(row);
                });

                listWrapper.querySelectorAll('.remove-dokydka-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.getAttribute('data-index'));
                        const deleted = items[idx];
                        const updated = items.filter((_, i) => i !== idx);
                        saveDokydkaItems(updated);
                        showToast(`Вилучено: ${deleted.article}`, 'info');
                        renderAll(allUniqueRows);
                    });
                });
            }

            // Копіювання докидки в буфер
            document.getElementById('copy-dokydka-text-btn').addEventListener('click', () => {
                const items = getDokydkaItems();
                if (items.length === 0) return;
                
                let text = "ДОКИДКА ВІДКЛАДЕНОГО\n\n";
                items.forEach((item, idx) => {
                    text += `${idx + 1}. Артикул: ${item.article} | Ячейка: ${item.cell} | К-сть: ${item.count}\n`;
                });

                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);

                showToast("Список скопійовано!", "success");
            });

            // Відправка в Таблицю
            document.getElementById('send-to-sheets-btn').addEventListener('click', async () => {
                const url = localStorage.getItem('apps_script_url_v2') || DEFAULT_APPS_SCRIPT_URL;
                const items = getDokydkaItems();

                if (items.length === 0) {
                    showToast('Список порожній', 'error');
                    return;
                }

                showConfirm("Надсилання", `Додати ${items.length} товарів у лист «Докидка відкладеного»?`, async () => {
                    const btn = document.getElementById('send-to-sheets-btn');
                    const originalText = btn.innerHTML;
                    btn.disabled = true;
                    btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Відправка...`;

                    try {
                        await fetch(url, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(items)
                        });

                        showToast('Успішно надіслано в Таблицю!', 'success');
                        saveDokydkaItems([]);
                        renderAll(allUniqueRows);

                    } catch (error) {
                        console.error(error);
                        showToast(`Помилка: ${error.message}`, 'error');
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                    }
                });
            });

            // Рендер карток товарів
            function renderAll(rows) {
                let filteredRows = [...rows];

                // Пошук
                if (searchQuery.trim() !== '') {
                    const query = searchQuery.toLowerCase().trim();
                    filteredRows = filteredRows.filter(item => 
                        item.article.toLowerCase().includes(query) || 
                        item.name.toLowerCase().includes(query) ||
                        item.cell.toLowerCase().includes(query)
                    );
                }

                // СОРТУВАННЯ: від найбільшої кількості відкладеного до найменшої (b.count - a.count)
                filteredRows.sort((a, b) => b.count - a.count);

                if (filteredRows.length === 0) {
                    const emptyStateHtml = `
                        <div class="text-center py-16 text-slate-400 flex flex-col items-center justify-center gap-2">
                            <i class="fa-solid fa-box-open text-3xl text-slate-200"></i>
                            <p class="text-xs font-bold text-slate-600">Нічого не знайдено</p>
                        </div>
                    `;
                    mobileCardsList.innerHTML = emptyStateHtml;
                    return;
                }

                const seenList = getSeenArticles();
                const seenMap = new Map(seenList.map(i => [i.article, i.seenTime]));
                const dokydkaItems = getDokydkaItems();

                mobileCardsList.innerHTML = '';

                const regularItems = [];
                const seenItems = [];

                filteredRows.forEach(item => {
                    const isSeen = seenMap.has(item.article);
                    const seenTime = seenMap.get(item.article) || 0;
                    
                    let rowStateClass = '';
                    let isUpdated = false;

                    if (isSeen) {
                        if (item.lastTimestamp > seenTime) {
                            rowStateClass = 'updated-row';
                            isUpdated = true;
                            regularItems.push({ item, rowStateClass, isSeen: false, isUpdated });
                        } else {
                            rowStateClass = 'seen-row';
                            seenItems.push({ item, rowStateClass, isSeen: true, isUpdated });
                        }
                    } else {
                        regularItems.push({ item, rowStateClass, isSeen: false, isUpdated });
                    }
                });

                const finalRenderSequence = [...regularItems, ...seenItems];

                finalRenderSequence.forEach(({ item, rowStateClass, isSeen, isUpdated }) => {
                    const isInDokydka = dokydkaItems.some(di => di.article === item.article);
                    const isLiftedToday = item.liftedBy === todayFormatted;

                    // Парсимо числові значення для розумного дефіциту та добору
                    const inCellVal = parseFloat(item.inCell) || 0;
                    const countVal = parseFloat(item.count) || 0;

                    // Динамічний колір для "В ячейці"
                    let inCellColorClass = 'bg-slate-100 text-slate-700 border-slate-200';
                    if (inCellVal <= 0) {
                        inCellColorClass = 'bg-rose-50 text-rose-700 border-rose-200/60 font-black';
                    } else if (inCellVal < countVal) {
                        inCellColorClass = 'bg-amber-50 text-amber-700 border-amber-200/60 font-black';
                    } else {
                        inCellColorClass = 'bg-emerald-50 text-emerald-700 border-emerald-200/60 font-black';
                    }

                    // Оформлення статусу підйому сьогодні
                    let liftStatusHtml = '';
                    if (isLiftedToday) {
                        liftStatusHtml = `
                            <span class="bg-emerald-50 text-emerald-750 text-[9px] font-bold px-2 py-0.5 rounded-full border border-emerald-100/80 flex items-center gap-1">
                                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
                                Піднято о ${item.liftedTime || '—'} (${item.liftedBy})
                            </span>
                        `;
                    } else {
                        liftStatusHtml = `
                            <span class="text-slate-400 text-[9px] font-semibold flex items-center gap-1">
                                <span class="w-1.5 h-1.5 bg-slate-300 rounded-full"></span>
                                Піднімали раніше (${item.liftedBy || '—'} о ${item.liftedTime || '—'})
                            </span>
                        `;
                    }

                    const card = document.createElement('div');
                    card.className = `bg-white p-3.5 rounded-3xl shadow-sm border border-slate-100 flex flex-col gap-2.5 relative transition-all active:scale-[0.99] ${rowStateClass}`;
                    card.setAttribute('data-article', item.article);
                    card.setAttribute('data-last-timestamp', item.lastTimestamp);

                    card.innerHTML = `
                        <!-- Верхній блок: Артикул та Дії -->
                        <div class="flex items-center justify-between gap-3">
                            <div class="flex items-center gap-2.5 min-w-0">
                                <!-- Кнопка Докидки -->
                                <button class="dokydka-toggle-btn w-7 h-7 rounded-full flex items-center justify-center transition-all ${isInDokydka ? 'bg-emerald-500 text-white shadow-md' : 'bg-slate-100 text-slate-400 border border-slate-200/60 hover:bg-slate-200'}">
                                    <i class="fa-solid fa-check text-[10px]"></i>
                                </button>
                                <div class="flex flex-col min-w-0">
                                    <span class="text-[8px] font-black text-slate-400 uppercase tracking-wider">АРТИКУЛ</span>
                                    <span class="text-sm font-black text-slate-900 tracking-tight select-all truncate">${item.article}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Назва товару -->
                        <div class="text-[11px] font-bold text-slate-700 line-clamp-1 leading-snug">${item.name}</div>

                        <!-- Локація (Ячейка відбору) - Максимально видно -->
                        <div class="flex gap-2 text-xs font-black">
                            <div class="bg-slate-900 text-white px-3 py-1.5 rounded-xl flex items-center gap-1.5">
                                <span class="text-[8px] text-slate-400 uppercase tracking-wider font-bold">Ячейка:</span>
                                <span>${item.cell || '—'}</span>
                            </div>
                        </div>

                        <!-- Інформаційне табло: ВІДКЛАЛИ | В ЯЧЕЙЦІ | ЗАПАС -->
                        <div class="grid grid-cols-3 gap-1.5 pt-1">
                            <!-- 1. Скільки відклали -->
                            <div class="bg-cyan-50/60 rounded-2xl p-2.5 border border-cyan-100 text-center flex flex-col justify-center">
                                <span class="text-[8px] font-black text-cyan-600 uppercase tracking-wider block mb-0.5">Відклали</span>
                                <span class="text-sm font-black text-cyan-900">${item.count} шт</span>
                            </div>

                            <!-- 2. Скільки в ячейці -->
                            <div class="rounded-2xl p-2.5 border text-center flex flex-col justify-center ${inCellColorClass}">
                                <span class="text-[8px] font-black uppercase tracking-wider block mb-0.5">В ячейці</span>
                                <span class="text-sm font-black">${item.inCell || '0'} шт</span>
                            </div>

                            <!-- 3. Скільки запас (Місце та палета в одному блоці) -->
                            <div class="bg-purple-50/60 rounded-2xl p-2.5 border border-purple-100 text-center flex flex-col justify-center min-w-0">
                                <span class="text-[8px] font-black text-purple-600 uppercase tracking-wider block mb-0.5">Запас (Місце)</span>
                                <span class="text-xs font-black text-purple-900 truncate block">
                                    ${item.stock ? item.stock : 'Немає'}
                                </span>
                                ${item.stock && item.pallet ? `<span class="text-[9px] font-bold text-purple-500 block truncate mt-0.5">Пал: ${item.pallet}</span>` : ''}
                            </div>
                        </div>

                        <!-- Нижній блок: Підйоми та приховування -->
                        <div class="flex items-center justify-between mt-0.5 pt-2 border-t border-slate-50">
                            ${liftStatusHtml}
                            
                            <button class="hide-button text-slate-300 hover:text-slate-500 p-1 rounded transition-all">
                                <i class="fa-solid ${isSeen && !isUpdated ? 'fa-eye-slash text-slate-300' : 'fa-eye'} text-sm"></i>
                            </button>
                        </div>
                    `;
                    mobileCardsList.appendChild(card);
                });

                // Події докидки
                document.querySelectorAll('.dokydka-toggle-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const row = btn.closest('[data-article]');
                        const art = row.getAttribute('data-article');
                        const rawItem = allUniqueRows.find(r => r.article === art);
                        if (rawItem) toggleDokydkaItem(rawItem);
                    });
                });
            }

            // Логіка Сховати/Показати
            function handleToggleSeen(article, row) {
                let seen = getSeenArticles();
                const isAlreadySeen = row.classList.contains('seen-row');

                if (isAlreadySeen) {
                    seen = seen.filter(i => i.article !== article);
                    showToast(`Артикул ${article} відновлено`, 'info');
                } else {
                    seen = seen.filter(i => i.article !== article);
                    seen.push({ article, seenTime: Date.now() });
                    showToast(`Приховано артикул ${article}`, 'success');
                }
                saveSeenArticles(seen);
                renderAll(allUniqueRows);
            }

            mobileCardsList.addEventListener('click', (e) => {
                const btn = e.target.closest('.hide-button');
                if (!btn) return;
                const card = btn.closest('[data-article]');
                const article = card.getAttribute('data-article');
                handleToggleSeen(article, card);
            });

            // Обробка сирих даних
            function processRawData(rows) {
                if (rows.length < 3) {
                    showError('Лист таблиці порожній.');
                    return;
                }

                const headerRow = rows[1];
                const idx = buildColumnIndices(headerRow);

                const required = ['article', 'date', 'name', 'liftedBy', 'stock', 'pallet', 'cell', 'inCell'];
                for (const key of required) {
                    if (idx[key] === -1) {
                        showError(`Не знайдено обов'язкову колонку "${HEADERS[key]}"`);
                        return;
                    }
                }

                const dataRows = rows.slice(2);
                const articlesToday = dataRows.filter(row => row[idx.date] === todayFormatted);

                if (articlesToday.length === 0) {
                    loader.classList.add('hidden');
                    dataContainer.innerHTML = `
                        <div class="text-center py-20 text-slate-400 flex flex-col items-center justify-center gap-2">
                            <i class="fa-solid fa-calendar-xmark text-4xl text-slate-300"></i>
                            <p class="text-xs font-bold text-slate-700">За сьогодні нічого не відкладали</p>
                        </div>
                    `;
                    dataContainer.classList.remove('hidden');
                    uniqueArticlesCountSpan.textContent = "0 артикулів сьогодні";
                    return;
                }

                const articleDataMap = new Map();

                articlesToday.forEach(row => {
                    const article = row[idx.article];
                    if (!article) return;

                    const ts = parseDateTime(row[idx.date], row[idx.timeAfterDate]);
                    const existing = articleDataMap.get(article);

                    if (!existing || ts > existing.lastTimestamp) {
                        articleDataMap.set(article, {
                            article,
                            lastTimestamp: ts,
                            count: existing ? existing.count + 1 : 1,
                            name: row[idx.name] || '',
                            liftedBy: row[idx.liftedBy] || '',
                            liftedTime: row[idx.timeAfterLifted] || '',
                            stock: row[idx.stock] || '',
                            pallet: row[idx.pallet] || '',
                            cell: row[idx.cell] || '',
                            inCell: row[idx.inCell] || ''
                        });
                    } else {
                        existing.count += 1;
                    }
                });

                allUniqueRows = Array.from(articleDataMap.values());

                uniqueArticlesCountSpan.textContent = `${allUniqueRows.length} унікальних артикулів`;
                
                loader.classList.add('hidden');
                dataContainer.classList.remove('hidden');

                renderAll(allUniqueRows);
                updateDokydkaInterface();
            }

            // Завантаження Google Sheets
            async function loadData(forceReload = false) {
                if (!navigator.onLine && !forceReload) {
                    const cached = getCachedData();
                    if (cached) {
                        processRawData(cached);
                        showToast('Дані з офлайн-кешу', 'info');
                        return;
                    }
                }

                loader.classList.remove('hidden');
                dataContainer.classList.add('hidden');

                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent("'" + SHEET_NAME + "'!A:J")}?key=${API_KEY}`;

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`Статус ${response.status}`);

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const rows = data.values || [];
                    saveCachedData(rows);
                    processRawData(rows);

                    if (forceReload) showToast('Дані оновлено!', 'success');

                } catch (error) {
                    console.error(error);
                    const cached = getCachedData();
                    if (cached) {
                        processRawData(cached);
                        showToast('Завантажено локальний кеш', 'error');
                    } else {
                        showError(error.message || 'Невідома помилка підключення');
                    }
                }
            }

            // Пошук
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderAll(allUniqueRows);
            });

            // Нижнє меню
            const listTab = document.getElementById('tab-list-content');
            const dokydkaTab = document.getElementById('tab-dokydka-content');
            const searchSection = document.getElementById('search-section');

            document.querySelectorAll('.nav-tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.getAttribute('data-target');

                    document.querySelectorAll('.nav-tab-btn').forEach(b => {
                        b.classList.remove('text-cyan-600');
                        b.classList.add('text-slate-400');
                        b.querySelector('span').classList.replace('font-black', 'font-medium');
                    });

                    btn.classList.add('text-cyan-600');
                    btn.classList.remove('text-slate-400');
                    btn.querySelector('span').classList.replace('font-medium', 'font-black');

                    if (target === 'list') {
                        listTab.classList.remove('hidden');
                        dokydkaTab.classList.add('hidden');
                        searchSection.classList.remove('hidden');
                    } else if (target === 'dokydka') {
                        listTab.classList.add('hidden');
                        dokydkaTab.classList.remove('hidden');
                        searchSection.classList.add('hidden');
                        updateDokydkaInterface();
                    }
                });
            });

            // Кнопка оновити
            document.getElementById('refresh-data-btn').addEventListener('click', () => {
                loadData(true);
            });

            // Toggle налаштувань
            document.getElementById('toggle-settings-btn').addEventListener('click', () => {
                const settingsPanel = document.getElementById('settings-panel');
                const chevron = document.getElementById('settings-chevron');
                const isHidden = settingsPanel.classList.toggle('hidden');
                if (isHidden) chevron.classList.remove('rotate-180');
                else chevron.classList.add('rotate-180');
            });

            // Скинути переглянуті
            if (resetButton) {
                resetButton.addEventListener('click', () => {
                    showConfirm('Показати всі приховані?', 'Повернути всі приховані вами товари назад у загальний список?', () => {
                        localStorage.removeItem('seenArticles_v3');
                        renderAll(allUniqueRows);
                        showToast('Всі товари знову показуються!', 'success');
                    });
                });
            }

            // Код Apps Script
            document.getElementById('copy-script-code-btn').addEventListener('click', () => {
                const scriptCode = `function doPost(e) {
  var lock = LockService.getScriptLock();
  lock.tryLock(10000);
  try {
    var doc = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = doc.getSheetByName("Докидка відкладеного");
    if (!sheet) {
      sheet = doc.insertSheet("Докидка відкладеного");
      sheet.appendRow(["Артикул", "Назва", "Ячейка", "Запас", "К-сть", "Дата додавання"]);
      sheet.getRange(1, 1, 1, 6).setFontWeight("bold").setBackground("#e6f7ff");
    }
    
    var data = JSON.parse(e.postData.contents);
    var today = new Date();
    
    data.forEach(function(item) {
      sheet.appendRow([
        item.article,
        item.name,
        item.cell,
        item.stock,
        item.count,
        today
      ]);
    });
    
    return ContentService.createTextOutput(JSON.stringify({ "status": "success" }))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({ "status": "error", "message": error.toString() }))
      .setMimeType(ContentService.MimeType.JSON);
  } finally {
    lock.releaseLock();
  }
}`;
                const el = document.createElement('textarea');
                el.value = scriptCode;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("Скрипт скопійовано!", "success");
            });

            // Старт
            loadData();
        });

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'vidkladaute-pwa-cache-v3';
                    const ASSETS_TO_CACHE = [
                        '${window.location.pathname}',
                        'https://cdn.tailwindcss.com',
                        'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css'
                    ];

                    self.addEventListener('install', (event) => {
                        event.waitUntil(
                            caches.open(CACHE_NAME).then((cache) => {
                                return cache.addAll(ASSETS_TO_CACHE);
                            }).then(() => self.skipWaiting())
                        );
                    });

                    self.addEventListener('activate', (event) => {
                        event.waitUntil(
                            caches.keys().then((keys) => {
                                return Promise.all(
                                    keys.map((key) => {
                                        if (key !== CACHE_NAME) {
                                            return caches.delete(key);
                                        }
                                    })
                                );
                            }).then(() => self.clients.claim())
                        );
                    });

                    self.addEventListener('fetch', (event) => {
                        if (event.request.url.includes('googleapis.com') || event.request.url.includes('script.google.com')) {
                            return;
                        }
                        event.respondWith(
                            caches.match(event.request).then((cachedResponse) => {
                                if (cachedResponse) return cachedResponse;
                                return fetch(event.request).then((response) => {
                                    if (response.status === 200) {
                                        const responseCopy = response.clone();
                                        caches.open(CACHE_NAME).then((cache) => {
                                            cache.put(event.request, responseCopy);
                                        });
                                    }
                                    return response;
                                }).catch(() => caches.match('${window.location.pathname}'));
                            })
                        );
                    });
                `;

                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl, { scope: './' })
                    .then(() => console.log('PWA Service Worker Ready'));
            });
        }
    </script>
</body>
</html>
